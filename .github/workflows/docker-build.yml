name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build project
        run: mvn clean package -DskipTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.ritheshr21 }}
          password: ${{ secrets.Iloveavocado21 }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.ritheshr21 }}/banking-system .

      - name: Push Docker image
        run: docker push ${{ secrets.ritheshr21 }}/banking-system